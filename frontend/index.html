<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Quiz System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Card Style */
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        h3 {
            color: #555;
            margin: 15px 0;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
            margin: 5px;
        }

        button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-danger {
            background: #f44336;
        }

        .btn-danger:hover {
            background: #da190b;
        }

        .btn-success {
            background: #4CAF50;
        }

        .btn-success:hover {
            background: #45a049;
        }

        /* Quiz Styles */
        .question {
            font-size: 1.3rem;
            margin-bottom: 25px;
            color: #2c3e50;
            font-weight: bold;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option.selected {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 20px;
        }

        .counter {
            color: #666;
            margin-bottom: 15px;
            text-align: right;
            font-weight: bold;
        }

        /* Dashboard Table */
        .table-container {
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #667eea;
            color: white;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .score-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 5px;
            font-weight: bold;
        }

        .score-high {
            background: #d4edda;
            color: #155724;
        }

        .score-medium {
            background: #fff3cd;
            color: #856404;
        }

        .score-low {
            background: #f8d7da;
            color: #721c24;
        }

        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .student-info {
            background: #e8f0fe;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        /* Hide/Show */
        .hidden {
            display: none;
        }

        .back-btn {
            background: #764ba2;
            margin-bottom: 15px;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login/Start Page -->
        <div id="startPage" class="card">
            <h1>📚 Student Quiz System</h1>
            <p style="margin-bottom: 20px; color: #666;">Please enter your details to start the quiz</p>
            
            <div class="form-group">
                <label>Full Name:</label>
                <input type="text" id="studentName" placeholder="Enter your full name">
            </div>
            
            <div class="form-group">
                <label>USN (University Seat Number):</label>
                <input type="text" id="studentUSN" placeholder="e.g., 4JC20CS001">
            </div>
            
            <button onclick="startQuiz()" style="width: 100%;">Start Quiz </button>
            
            <hr style="margin: 20px 0;">
            
            <button onclick="showDashboard()" class="btn-success" style="width: 100%;">View Admin Dashboard</button>
        </div>

        <!-- Quiz Page -->
        <div id="quizPage" class="card hidden">
            <div class="student-info" id="studentInfo"></div>
            <div class="counter" id="counter">Question 1 of 5</div>
            <h2>📝 Quiz</h2>
            <div class="question" id="question"></div>
            <div class="options" id="options"></div>
            <div class="nav-buttons">
                <button id="prevBtn" disabled>◀ Previous</button>
                <button id="nextBtn">Next ▶</button>
            </div>
            <button onclick="backToStart()" class="back-btn" style="margin-top: 20px; width: 100%;">🏠 Back to Start</button>
        </div>

        <!-- Dashboard Page -->
        <div id="dashboardPage" class="card hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>📊 Student Results Dashboard</h2>
                <button onclick="backToStart()" class="back-btn">🏠 Back</button>
            </div>
            
            <div class="dashboard-stats" id="stats"></div>
            
            <div class="table-container">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>Sl No</th>
                            <th>Name</th>
                            <th>USN</th>
                            <th>Score</th>
                            <th>Percentage</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            
            <div style="margin-top: 20px; text-align: center;">
                <button onclick="clearAllData()" class="btn-danger">🗑️ Clear All Data</button>
                <button onclick="exportToCSV()" class="btn-success">📥 Export to CSV</button>
            </div>
        </div>
    </div>

    <script>
        // Questions data
        const questions = [
            {
                text: "What is the capital of France?",
                options: ["London", "Berlin", "Paris", "Madrid"],
                correct: 2
            },
            {
                text: "Which language runs in a web browser?",
                options: ["Java", "C", "Python", "JavaScript"],
                correct: 3
            },
            {
                text: "What does HTML stand for?",
                options: [
                    "Hyper Text Markup Language",
                    "High Tech Modern Language",
                    "Hyper Transfer Markup Language",
                    "Home Tool Markup Language"
                ],
                correct: 0
            },
            {
                text: "Who painted the Mona Lisa?",
                options: ["Van Gogh", "Picasso", "Da Vinci", "Rembrandt"],
                correct: 2
            },
            {
                text: "What is 5 + 7?",
                options: ["10", "11", "12", "13"],
                correct: 2
            }
        ];

        let currentQuestion = 0;
        let answers = new Array(questions.length).fill(null);
        let currentStudent = null;
        let quizData = [];

        // Load data from localStorage
        function loadData() {
            const stored = localStorage.getItem('quizResults');
            if (stored) {
                quizData = JSON.parse(stored);
            } else {
                // Add sample data for demo
                quizData = [
                    {
                        name: "John Doe",
                        usn: "4JC20CS001",
                        score: 4,
                        total: 5,
                        percentage: 80,
                        date: new Date().toLocaleString(),
                        answers: [2, 3, 0, 2, 2]
                    },
                    {
                        name: "Jane Smith",
                        usn: "4JC20CS002",
                        score: 5,
                        total: 5,
                        percentage: 100,
                        date: new Date().toLocaleString(),
                        answers: [2, 3, 0, 2, 2]
                    }
                ];
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem('quizResults', JSON.stringify(quizData));
        }

        function startQuiz() {
            const name = document.getElementById('studentName').value.trim();
            const usn = document.getElementById('studentUSN').value.trim();
            
            if (!name || !usn) {
                alert('❌ Please enter both Name and USN!');
                return;
            }
            
            currentStudent = { name, usn };
            document.getElementById('studentInfo').innerHTML = `
                <strong>👤 Name:</strong> ${name} &nbsp; | &nbsp;
                <strong>🎓 USN:</strong> ${usn}
            `;
            
            // Reset quiz
            currentQuestion = 0;
            answers = new Array(questions.length).fill(null);
            
            // Hide start page, show quiz page
            document.getElementById('startPage').style.display = 'none';
            document.getElementById('quizPage').style.display = 'block';
            document.getElementById('dashboardPage').style.display = 'none';
            
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question').textContent = q.text;
            document.getElementById('counter').textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
            
            // Render options
            const optionsEl = document.getElementById('options');
            optionsEl.innerHTML = '';
            q.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                if (answers[currentQuestion] === index) {
                    optionDiv.classList.add('selected');
                }
                optionDiv.textContent = `${String.fromCharCode(65 + index)}. ${option}`;
                optionDiv.onclick = () => selectAnswer(index);
                optionsEl.appendChild(optionDiv);
            });
            
            // Update buttons
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            prevBtn.disabled = currentQuestion === 0;
            if (currentQuestion === questions.length - 1) {
                nextBtn.textContent = 'Submit ✅';
            } else {
                nextBtn.textContent = 'Next ▶';
            }
        }

        function selectAnswer(optionIndex) {
            answers[currentQuestion] = optionIndex;
            renderQuestion();
        }

        function nextQuestion() {
            if (answers[currentQuestion] === null) {
                alert('⚠️ Please select an answer before proceeding!');
                return;
            }
            
            if (currentQuestion === questions.length - 1) {
                submitQuiz();
            } else {
                currentQuestion++;
                renderQuestion();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        function submitQuiz() {
            // Calculate score
            let score = 0;
            questions.forEach((q, i) => {
                if (answers[i] === q.correct) score++;
            });
            
            const percentage = (score / questions.length) * 100;
            
            // Save result
            const result = {
                name: currentStudent.name,
                usn: currentStudent.usn,
                score: score,
                total: questions.length,
                percentage: percentage,
                date: new Date().toLocaleString(),
                answers: [...answers]
            };
            
            quizData.push(result);
            saveData();
            
            // Show result
            let message = '';
            if (percentage >= 70) message = '🎉 Excellent! Great job! 🎉';
            else if (percentage >= 40) message = '👍 Good effort! Keep learning! 👍';
            else message = '📚 Don\'t worry! Try again! 📚';
            
            alert(`Quiz Complete!\n\nYour Score: ${score}/${questions.length}\nPercentage: ${percentage}%\n\n${message}`);
            
            backToStart();
        }

        function showDashboard() {
            loadData();
            updateDashboard();
            document.getElementById('startPage').style.display = 'none';
            document.getElementById('quizPage').style.display = 'none';
            document.getElementById('dashboardPage').style.display = 'block';
        }

        function updateDashboard() {
            // Update stats
            const totalStudents = quizData.length;
            const avgScore = quizData.length > 0 
                ? (quizData.reduce((sum, s) => sum + s.percentage, 0) / quizData.length).toFixed(1)
                : 0;
            const highestScore = quizData.length > 0
                ? Math.max(...quizData.map(s => s.percentage))
                : 0;
            const passCount = quizData.filter(s => s.percentage >= 40).length;
            
            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${totalStudents}</div>
                    <div class="stat-label">Total Students</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${avgScore}%</div>
                    <div class="stat-label">Average Score</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${highestScore}%</div>
                    <div class="stat-label">Highest Score</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${passCount}</div>
                    <div class="stat-label">Students Passed</div>
                </div>
            `;
            
            // Update table
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            if (quizData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center;">No data available. Take a quiz first!</td></tr>';
                return;
            }
            
            quizData.slice().reverse().forEach((data, index) => {
                const row = tbody.insertRow();
                const scoreClass = data.percentage >= 70 ? 'score-high' : (data.percentage >= 40 ? 'score-medium' : 'score-low');
                const status = data.percentage >= 40 ? '✅ Pass' : '❌ Fail';
                
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${data.name}</td>
                    <td>${data.usn}</td>
                    <td>${data.score}/${data.total}</td>
                    <td>${data.percentage}%</td>
                    <td><span class="score-badge ${scoreClass}">${status}</span></td>
                    <td>${data.date}</td>
                    <td><button onclick="deleteResult(${quizData.length - 1 - index})" class="btn-danger" style="padding: 5px 10px; font-size: 12px;">Delete</button></td>
                `;
            });
        }

        function deleteResult(index) {
            if (confirm('Are you sure you want to delete this result?')) {
                quizData.splice(index, 1);
                saveData();
                updateDashboard();
            }
        }

        function clearAllData() {
            if (confirm('⚠️ WARNING: This will delete ALL student data! Are you sure?')) {
                quizData = [];
                saveData();
                updateDashboard();
                alert('All data cleared!');
            }
        }

        function exportToCSV() {
            if (quizData.length === 0) {
                alert('No data to export!');
                return;
            }
            
            let csv = "Name,USN,Score,Total,Percentage,Status,Date\n";
            quizData.forEach(data => {
                const status = data.percentage >= 40 ? "Pass" : "Fail";
                csv += `"${data.name}","${data.usn}",${data.score},${data.total},${data.percentage}%,${status},"${data.date}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `quiz_results_${new Date().toISOString().split('T')[0]}.csv`;
            a.c
